<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Viewer</title>

<style>
body {
  margin:0;
  background:#000;
  font-family: "Prompt", sans-serif;
}

.viewer-container {
  position: relative;
  width: 100%;
  height: 100vh;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* 🔥 กล่องข้อมูล (ขาว สวย อ่านง่าย) */
.info-box {
  position: absolute;
  bottom: 30px;
  left: 30px;
  width: 460px;
  max-height: 55vh;
  overflow-y: auto;

  padding: 26px;
  border-radius: 18px;

  background: #ffffff;
  color: #222;

  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  transition: 0.4s;
  z-index: 9999;
}

.info-box.hide {
  transform: translateY(120%);
  opacity: 0;
}

.info-title {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 12px;
}

.info-desc {
  font-size: 17px;
  line-height: 1.8;
}

/* 🔘 ปุ่ม */
.controls {
  position: absolute;
  top: 20px;
  right: 20px;
  display: flex;
  gap: 10px;
  z-index: 9999;
}

.btn {
  color: #fff;
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.05);
}

/* 🎨 สีปุ่ม */
.btn.play { background: #ff5722; }
.btn.stop { background: #333; }
.btn.hide { background: #009688; }

/* 📄 ปุ่มแสดง */
.show-btn {
  position: absolute;
  bottom: 20px;
  left: 20px;
  background: #009688;
  color: #fff;
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
  display: none;
  z-index: 9999;
}

/* 📱 Mobile */
@media (max-width: 768px) {

  .info-box {
    position: fixed !important;
    top: 0 !important;
    left: 0;
    right: 0;
    bottom: auto;

    width: 90%;
    /* height: 20vh; */

    border-radius: 0 0 20px 20px;
    padding: 21px;

    background: #ffffff;
  }

  .info-title {
    font-size: 18px;
  }

  .info-desc {
    font-size: 14px;
  }

  .controls {
    top: auto;
    bottom: 10px;
    right: 10px;
    flex-direction: column;
  }
}
</style>
</head>

<body>

<div class="viewer-container">

  <iframe id="viewer"></iframe>

  <div class="info-box" id="infoBox">
    <div class="info-title" id="title">กำลังโหลด...</div>
    <div class="info-desc" id="desc"></div>
  </div>

  <div class="controls">
    <div class="btn play" onclick="speakText()">🔊</div>
    <div class="btn stop" onclick="stopText()">⏹</div>
    <div class="btn hide" onclick="toggleBox()">❌</div>
  </div>

  <div class="show-btn" id="showBtn" onclick="showBox()">📄 แสดงข้อมูล</div>

</div>

<script>

const id = params.get("id");

const viewer = document.getElementById("viewer");

const showBtn = document.getElementById("showBtn");

    },

    },
    4: {

      desc: "ข้าวแช่แม่เล็กสะกิดใจ เป็นร้านอาหารพื้นบ้านชื่อดังในท่ายาง โดดเด่นด้วยข้าวแช่หอมเย็นพร้อมเครื่องเคียงแบบดั้งเดิม สะท้อนวัฒนธรรมอาหารเพชรบุรี"
    },
    9: {
      name: "ศาลเจ้าแม่ทับทิม",
      url: "https://sketchfab.com/models/23d7e59a3bec4d84abca9c5a6d77f46a/embed",
      desc: "ศาลเจ้าแม่ทับทิม เป็นสถานที่ศักดิ์สิทธิ์ที่ชาวไทยเชื้อสายจีนเคารพนับถือ ใช้สักการะขอพรด้านความปลอดภัย โชคลาภ และความเจริญรุ่งเรือง"
    }
  };
  
if (models[id]) {
  viewer.src = models[id].url;
  title.innerText = "📍 " + models[id].name;
  desc.innerText = models[id].desc;
  currentText = models[id].name + " " + models[id].desc;
} else {
  title.innerText = "ไม่พบข้อมูล";
}

/* 🔊 เสียง */
function speakText() {
  window.speechSynthesis.cancel();
  const speech = new SpeechSynthesisUtterance(currentText);
  speech.lang = "th-TH";
  window.speechSynthesis.speak(speech);
}

function stopText() {
  window.speechSynthesis.cancel();
}

/* ❌ ซ่อน */
function toggleBox() {
  infoBox.classList.add("hide");
  showBtn.style.display = "block";
}

/* 📄 แสดง */
function showBox() {
  infoBox.classList.remove("hide");
  showBtn.style.display = "none";
}
</script>

</body>
</html>
